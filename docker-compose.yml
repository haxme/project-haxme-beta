services:
  web:
    build: .
    ports:
      - "${HXME_PORT:-8080}:80"
    environment:
      DB_HOST: db
      DB_NAME: haxme
      DB_USER: haxme
      DB_PASSWORD: haxme
      HXME_BASE_URL: "${HXME_BASE_URL:-http://localhost:8080}"
      HXME_USERNAME: "${HXME_USERNAME:-admin}"
      HXME_PASSWORD: "${HXME_PASSWORD:-haxme}"
      HXME_DISPLAY_NAME: "${HXME_DISPLAY_NAME:-admin}"
      HXME_EMAIL: "${HXME_EMAIL:-admin@localhost}"
    depends_on:
      - db

  db:
    image: mariadb:10.6
    environment:
      MARIADB_DATABASE: haxme
      MARIADB_USER: haxme
      MARIADB_PASSWORD: haxme
      MARIADB_ROOT_PASSWORD: haxme-root
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/initdb:/docker-entrypoint-initdb.d:ro

volumes:
  db_data:
